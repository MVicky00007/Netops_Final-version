# ── Server ───────────────────────────────────────────────────────────
# Same port the original monolith used so existing clients keep working.
server.port=9097

# ── Spring ───────────────────────────────────────────────────────────
spring.application.name=api-gateway

# ── Spring Cloud Gateway ─────────────────────────────────────────────
spring.cloud.gateway.discovery.locator.enabled=false

# ── CORS — wide-open in dev ──────────────────────────────────────────
# allowedOriginPatterns="*" combined with allowCredentials=true is the
# universal pattern: Spring echoes back the actual `Origin` request header
# so the call works regardless of whether the browser opens the app via
# localhost / 127.0.0.1 / the machine hostname / a LAN IP / VS Code preview.
#
# IN PRODUCTION, lock this down to your real frontend domain, e.g.:
#   spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=https://netops.example.com
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Strip duplicate CORS headers when downstream services add their own.
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# ── Routes ──────────────────────────────────────────────────────────
# Each route: spring.cloud.gateway.routes[N].(id|uri|predicates[M])

# user-service — auth endpoints
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/signup,/login,/forgot-password,/update-profile

# user-service — admin endpoints
spring.cloud.gateway.routes[1].id=user-service-admin
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users,/update-role,/block-user,/approve-user,/pending-users

# site-service — sites
spring.cloud.gateway.routes[2].id=site-service-sites
spring.cloud.gateway.routes[2].uri=lb://site-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/sites/**

