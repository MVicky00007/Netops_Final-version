# In-memory H2 with MySQL compatibility — no MySQL required for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Don't try to register with Eureka during tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false

# JWT secret used to mint test tokens
jwt.secret=mysecuresecretkeymysecuresecretkey123
jwt.expiration=3600000

logging.level.org.springframework=WARN
logging.level.com.project.netops=INFO
