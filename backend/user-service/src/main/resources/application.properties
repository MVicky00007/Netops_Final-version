server.port=9101
spring.application.name=user-service

# Database (shared MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/netopsone
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT (same secret across all services so tokens are interoperable)
jwt.secret=mysecuresecretkeymysecuresecretkey123
jwt.expiration=3600000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.com.project.netops=DEBUG
