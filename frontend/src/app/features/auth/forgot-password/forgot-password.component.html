<div class="forgot-wrap">
  <mat-card class="forgot-card">
    <mat-card-header>
      <mat-card-title>Reset password</mat-card-title>
      <mat-card-subtitle>Enter your email and choose a new password</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="submit()" #f="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required
                 placeholder="your.email@example.com">
          <mat-icon matSuffix>mail</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>New password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 name="newPassword" [(ngModel)]="newPassword" required minlength="4">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword"
                  [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm new password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="4">
        </mat-form-field>

        @if (msg()) { <p [class.error]="isError()" [class.success]="!isError()">{{ msg() }}</p> }

        <button mat-flat-button color="primary" type="submit" class="full-width"
                [disabled]="!f.form.valid || submitting()">
          {{ submitting() ? 'Resetting…' : 'Reset password' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <a mat-button routerLink="/login">Back to login</a>
    </mat-card-actions>
  </mat-card>
</div>
